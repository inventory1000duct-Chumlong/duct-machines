  .pill-mute{background:#f1f5f9;color:#475569;}
  .pill-info{background:#cffafe;color:#0e7490;}
  .pill-accent{background:#ffe4e6;color:#be123c;}
  .ring-focus:focus{outline:none;box-shadow:0 0 0 3px rgba(220,38,38,0.18);border-color:var(--accent);}
  .nav-btn{padding:10px 14px;border-radius:10px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;color:#e2e8f0;transition:all .15s ease;}
  .nav-btn:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-btn.active{background:var(--accent);color:#fff;}
  .tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#f1f5f9;color:#334155;font-weight:500;}
  details > summary{list-style:none;cursor:pointer;}
  details > summary::-webkit-details-marker{display:none;}

  .corner-tl{position:absolute;top:8px;left:8px;width:16px;height:16px;border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
  .corner-br{position:absolute;bottom:8px;right:8px;width:16px;height:16px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);}
  @keyframes slidein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .anim-in{animation:slidein .25s ease both;}
  .stat-bar{height:6px;border-radius:3px;background:#f1f5f9;overflow:hidden;}
  .stat-bar > div{height:100%;background:var(--accent);}
  .grid-paper{background-image:linear-gradient(rgba(15,23,42,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,0.04) 1px,transparent 1px);background-size:24px 24px;}
  .scroll-thin::-webkit-scrollbar{width:6px;height:6px;}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
  .row-hover:hover{background:#fafaf7;}
  .stamp{display:inline-block;border:2px solid var(--danger);color:var(--danger);padding:2px 8px;font-weight:700;font-size:10px;transform:rotate(-3deg);letter-spacing:1px;opacity:0.7;}
  input[type="text"],input[type="number"],input[type="date"],textarea,select{background:#fff;}
  @media print{
    .no-print{display:none !important;}
    body{background:#fff;}

  }

/* ---------- GLOBAL ERROR HANDLER ---------- */
window.addEventListener("error", function(e){
  const detail = {
    msg: e.message || "(no message)",
    file: e.filename || "(no file)",
    line: e.lineno || "?",
    col: e.colno || "?",
    stack: e.error ? (e.error.stack || String(e.error)) : "(no stack)"
  };
  console.group("🔴 App Error");
  console.error("Message:", detail.msg);
  console.error("Location:", detail.file + ":" + detail.line + ":" + detail.col);
  console.error("Stack:", detail.stack);
  console.groupEnd();
  // Show on-screen banner so user can see it
  try{
    const id = "errBanner";
    let el = document.getElementById(id);
    if(!el){
      el = document.createElement("div");
      el.id = id;
      el.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#7f1d1d;color:#fff;padding:10px 14px;font:12px ui-monospace,monospace;z-index:9999;border-top:3px solid #fbbf24;white-space:pre-wrap;max-height:30vh;overflow:auto;";
      document.body.appendChild(el);
    }
    el.textContent = "⚠ Error: " + detail.msg + "\n  at " + detail.file + ":" + detail.line + "\n" + detail.stack.split("\n").slice(0,4).join("\n") + "\n\n(คลิกเพื่อปิด)";
    el.onclick = ()=>el.remove();
  }catch(_){}
});
window.addEventListener("unhandledrejection", function(e){
  console.error("Unhandled promise rejection:", e.reason);
});

/* ---------- API / SYNC LAYER ---------- */
async function api(action, payload={}){
  if(!state.serverUrl) throw new Error("ยังไม่ได้ตั้งค่า Server URL");
  const body = {
    action: action,
    payload: payload,
    user: state.currentUser,
    token: state.userToken
  };
  // text/plain to avoid CORS preflight on Apps Script
  const res = await fetch(state.serverUrl, {
    method: "POST",
    mode: "cors",
    redirect: "follow",
    headers: {"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error("HTTP "+res.status);
  const data = await res.json();
  if(data.ok === false) throw new Error(data.error || "Server error");
  return data;
}

async function syncPull(silent){
  if(!state.serverUrl || !state.currentUser) return;
  state.syncing = true;
  if(!silent) toast("กำลังดึงข้อมูลจากเซิร์ฟเวอร์...","info");
  try{
    const data = await api("getAll", {tenantId: state.currentTenantId});
    const serverMachines = Array.isArray(data.machines) ? data.machines : [];
    const serverPM = Array.isArray(data.pm) ? data.pm : [];
    
    // SAFETY: if server is empty but local has data, DON'T overwrite
    const localTenantMachines = state.machines.filter(m=>!m.tenantId || m.tenantId===state.currentTenantId);
    if(serverMachines.length === 0 && localTenantMachines.length > 0){
      setOnlineStatus(true);
      state.syncing = false;
      if(!silent) toast(`⚠ เซิร์ฟเวอร์ยังไม่มีข้อมูลของโรงงานนี้ — มี ${localTenantMachines.length} รายการในเครื่อง ให้กด "Push ทั้งหมด" เพื่ออัปโหลด`,"warn");
      return;
    }
    
    state.machines = serverMachines.map(normalizeMachine);
    state.pm = serverPM.map(normalizePM);
    if(Array.isArray(data.files)) state.files = data.files.map(normalizeFile);
    if(Array.isArray(data.repairs)) state.repairs = data.repairs.map(normalizeRepair);
    if(Array.isArray(data.tenants)) state.tenants = data.tenants.map(normalizeTenant);
    if(Array.isArray(data.logs)) state.logs = data.logs.map(l=>({
      id: uid(), ts: l.ts||new Date().toISOString(),
      action: l.action||"", target: l.target||"", detail: l.detail||"",
      user: l.user||""
    }));
    state.lastSync = new Date().toISOString();
    localStorage.setItem("duct_last_sync", state.lastSync);
    save();
    setOnlineStatus(true);
    if(!silent) toast(`ดึงข้อมูล ${state.machines.length} รายการสำเร็จ`,"ok");
    render();
  }catch(e){
    console.error("syncPull failed:", e);
    setOnlineStatus(false);
    if(!silent) toast("ดึงข้อมูลล้มเหลว: "+e.message,"danger");
  }finally{
    state.syncing = false;
  }
}

/* Convert ISO date string back to Thai BE short format (D/M/YY) */
function normalizeDate(d){
  if(!d) return "";
  // If it's a Date instance (from JSON deserialization)
  if(d instanceof Date) d = d.toISOString();
  if(typeof d !== "string") return String(d);
  d = d.trim();
  if(!d) return "";
  // ISO date string like "1968-01-04T17:00:00.000Z" → convert to Thai BE
  if(/^\d{4}-\d{2}-\d{2}T/.test(d) || /^\d{4}-\d{2}-\d{2}$/.test(d)){
    try{
      const dt = new Date(d);
      if(isNaN(dt.getTime())) return d;
      // Format in Bangkok timezone, then convert year to BE
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Bangkok",
        year: "numeric", month: "2-digit", day: "2-digit"
      }).formatToParts(dt);
      const map = {};
      parts.forEach(p => map[p.type] = p.value);
      const yearBE = parseInt(map.year) + 543;
      return `${parseInt(map.day)}/${parseInt(map.month)}/${String(yearBE).slice(-2)}`;
    }catch(e){ return d; }
  }
  return d;
}

/* ---------- FILE UPLOAD HELPER ---------- */
function fileToDataUrl(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(new Error("ไม่สามารถอ่านไฟล์ได้"));
    r.readAsDataURL(file);
  });
}

// Compress image to max width 1600px before upload (saves bandwidth)
async function compressImage(file, maxWidth=1600, quality=0.85){
  if(!file.type.startsWith("image/")) return await fileToDataUrl(file);
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const ratio = Math.min(1, maxWidth/img.width);
        const w = Math.round(img.width*ratio);
        const h = Math.round(img.height*ratio);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        // Use JPEG for compression (smaller than PNG for photos)
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = ()=>reject(new Error("รูปภาพไม่ถูกต้อง"));
      img.src = e.target.result;
    };
    r.onerror = ()=>reject(new Error("อ่านไฟล์ไม่สำเร็จ"));
    r.readAsDataURL(file);
  });
}

async function uploadFileToServer(machineId, file){
  if(!state.serverUrl || !state.currentUser){
    toast("ต้องเข้าสู่ระบบออนไลน์เพื่ออัปโหลดไฟล์","warn");
    return null;
  }
  
  // Validate size before processing
  if(file.size > 15*1024*1024){
    toast(`ไฟล์ใหญ่เกิน 15MB (${(file.size/1024/1024).toFixed(1)}MB)`,"danger");
    return null;
  }
  
  toast(`กำลังอัปโหลด ${file.name}...`,"info");
  try{
    const dataUrl = file.type.startsWith("image/") 
      ? await compressImage(file)
      : await fileToDataUrl(file);
    
    // Adjust filename if compressed (jpg now)
    let fileName = file.name;
    if(file.type.startsWith("image/") && !fileName.toLowerCase().endsWith(".jpg")){
      fileName = fileName.replace(/\.[^.]+$/, "") + ".jpg";
    }
    
    const result = await api("uploadFile", {
      tenantId: state.currentTenantId,
      machineId: machineId,
      fileName: fileName,
      dataUrl: dataUrl
    });
    
    if(result.file){
      state.files.push(normalizeFile(result.file));
      save();
      toast("อัปโหลดสำเร็จ","ok");
      return result.file;
    }
    throw new Error("Server ไม่ตอบกลับ");
  }catch(e){
    console.error("upload failed:",e);
    toast("อัปโหลดล้มเหลว: "+e.message,"danger");
    return null;
  }
}

async function deleteFileFromServer(fileId){

    return false;
  }
}

function fmtBytes(n){
  n = +n||0;
  if(n<1024) return n+" B";
  if(n<1024*1024) return (n/1024).toFixed(1)+" KB";
  return (n/1024/1024).toFixed(2)+" MB";
}

  }

}

function queuePush(action, payload){
  state.pendingQueue.push({action, payload, ts: Date.now()});
  localStorage.setItem("duct_queue", JSON.stringify(state.pendingQueue));
}

async function flushQueue(){
  if(!state.pendingQueue.length || !state.serverUrl) return;
  const q = state.pendingQueue.slice();
  state.pendingQueue = [];
  localStorage.setItem("duct_queue", "[]");
  let ok=0, fail=0;
  for(const item of q){
    try{ await api(item.action, item.payload); ok++; }
    catch(e){ fail++; state.pendingQueue.push(item); }
  }
  localStorage.setItem("duct_queue", JSON.stringify(state.pendingQueue));
  if(ok>0) toast(`ส่งข้อมูลค้างคิว ${ok} รายการสำเร็จ`+(fail?` (พลาด ${fail})`:""), fail?"warn":"ok");
}

function load(){
  // Always reset to safe defaults first
  state.machines = [];
  state.pm = [];
  state.logs = [];
  try{
    const m = localStorage.getItem(STORAGE_KEY);
    state.machines = m ? JSON.parse(m) : INITIAL_DATA.map(x=>({...x,id:uid()}));
  }catch(e){
    console.warn("Failed to parse machines from localStorage, using defaults",e);
    state.machines = INITIAL_DATA.map(x=>({...x,id:uid()}));
  }
  try{ state.pm = JSON.parse(localStorage.getItem(PM_KEY)||"[]"); }catch(e){ state.pm = []; }
  try{ state.logs = JSON.parse(localStorage.getItem(LOG_KEY)||"[]"); }catch(e){ state.logs = []; }
  try{ state.files = JSON.parse(localStorage.getItem(FILES_KEY)||"[]"); }catch(e){ state.files = []; }
  try{ state.repairs = JSON.parse(localStorage.getItem(REPAIRS_KEY)||"[]"); }catch(e){ state.repairs = []; }
  // ALWAYS run migration to backfill new fields (runs for both loaded and fresh data)
  if(!Array.isArray(state.machines)) state.machines = [];
  state.machines.forEach(m=>{
    if(!m || typeof m !== "object") return;
    if(!m.id) m.id = uid();
    if(m.vendor===undefined) m.vendor = "";
    if(m.price===undefined) m.price = 0;
    if(m.location===undefined) m.location = "";
    if(m.condition===undefined) m.condition = m.status==="ใช้งาน"?"พร้อมใช้งาน":"";
    if(m.note===undefined) m.note = "";
    if(m.kw===undefined) m.kw = 0;
    if(m.hp===undefined) m.hp = 0;
    if(m.status===undefined) m.status = "ใช้งาน";
    if(m.category===undefined) m.category = "อื่นๆ";
  });
  // Filter out any invalid entries
  state.machines = state.machines.filter(m=>m && typeof m === "object" && m.code);
}

/* Convert Thai BE short date to year (e.g. "3/3/63" → 2020) */
function parseRegYear(s){
  if(!s) return null;
  s = String(s);
  // Try ISO first
  const iso = s.match(/^(\d{4})-/);
  if(iso) return parseInt(iso[1]);
  // Thai BE short: "D/M/YY" or "D/M/YYYY"
  const parts = s.split(/[\/\-]/);
  if(parts.length>=3){
    let y = parseInt(parts[2]);
    if(isNaN(y)) return null;
    if(y < 100) y += 2500; // BE 2-digit → 25XX
    if(y > 2400 && y < 2700) y -= 543; // BE → CE
    return y;
  }
  return null;
}

function filtered(){
  // Tenant scope first
  let arr = state.machines.filter(m=>!m.tenantId || m.tenantId===state.currentTenantId);
  const q = state.search.trim().toLowerCase();
  if(q){
    arr = arr.filter(m=>
      [m.code,m.name,m.brand,m.serial,m.spec,m.category,m.vendor,m.location].some(v=>String(v||"").toLowerCase().includes(q))
    );
  }
  if(state.filterCategory!=="ทั้งหมด") arr = arr.filter(m=>m.category===state.filterCategory);
  if(state.filterStatus!=="ทั้งหมด") arr = arr.filter(m=>m.status===state.filterStatus);
  if(state.filterCondition!=="ทั้งหมด") arr = arr.filter(m=>m.condition===state.filterCondition);
  if(state.filterBrand!=="ทั้งหมด") arr = arr.filter(m=>m.brand===state.filterBrand);
  if(state.filterLocation!=="ทั้งหมด") arr = arr.filter(m=>m.location===state.filterLocation);
  if(state.filterPriceTier!=="ทั้งหมด"){
    arr = arr.filter(m=>{
      const p = +m.price||0;
      switch(state.filterPriceTier){
        case "ไม่ระบุ": return p===0;
        case "<100k": return p>0 && p<100000;
        case "100k-500k": return p>=100000 && p<500000;
        case "500k-1M": return p>=500000 && p<1000000;
        case ">1M": return p>=1000000;
      }
      return true;
    });
  }
  if(state.filterAgeYears!=="ทั้งหมด"){
    const nowYear = new Date().getFullYear();
    arr = arr.filter(m=>{
      const y = parseRegYear(m.regDate);
      if(!y) return state.filterAgeYears==="ไม่ระบุ";
      const age = nowYear - y;
      switch(state.filterAgeYears){
        case "ไม่ระบุ": return false;
        case "<2": return age<2;
        case "2-5": return age>=2 && age<5;
        case "5-10": return age>=5 && age<10;
        case ">10": return age>=10;
      }
      return true;
    });
  }
  arr.sort((a,b)=>{
    let av = a[state.sortBy], bv = b[state.sortBy];
    if(typeof av === "string") av = av.toLowerCase();
    if(typeof bv === "string") bv = bv.toLowerCase();
    if(av<bv) return state.sortDir==="asc"?-1:1;
    if(av>bv) return state.sortDir==="asc"?1:-1;
    return 0;
  });
  return arr;
}

function stats(){
  const m = state.machines.filter(x=>!x.tenantId || x.tenantId===state.currentTenantId);
  const active = m.filter(x=>x.status==="ใช้งาน");
  return {
    total: m.length,
    active: active.length,
    cancelled: m.filter(x=>x.status==="ยกเลิก").length,
    moved: m.filter(x=>x.status==="ย้าย").length,
    repair: m.filter(x=>x.status==="ซ่อม").length,
    ready: m.filter(x=>x.condition==="พร้อมใช้งาน").length,
    broken: m.filter(x=>x.condition==="ชำรุด").length,
    totalKw: active.reduce((s,x)=>s+(+x.kw||0),0),
    totalHp: active.reduce((s,x)=>s+(+x.hp||0),0),
    totalPrice: m.reduce((s,x)=>s+(+x.price||0),0),
    brands: [...new Set(m.map(x=>x.brand).filter(Boolean))].length,
    locations: [...new Set(m.map(x=>x.location).filter(Boolean))].length,
    categories: CATEGORIES.map(c=>({cat:c,count:m.filter(x=>x.category===c).length})).filter(x=>x.count>0)
  };
}

const VIEWS = ["dashboard","registry","categories","pm","repairs","logs","import","online"];
const VIEW_LABEL = {
  dashboard:"📊 แดชบอร์ด", registry:"📋 ทะเบียน", categories:"🗂 หมวดหมู่",
  pm:"🔧 PM", repairs:"🛠 ซ่อม", logs:"📜 บันทึก", import:"📂 นำเข้า/ส่งออก", online:"🌐 ออนไลน์"
};

function renderNav(){
  $("#mainNav").innerHTML = VIEWS.map(v=>
    `<button class="nav-btn ${state.view===v?'active':''}" onclick="setView('${v}')">${VIEW_LABEL[v]}</button>`
  ).join("");
}

function setView(v){ state.view = v; state.selectedId = null; render(); }

function render(){
  renderNav();
  updateUserBadge();
  // If server URL set but not logged in, show login screen
  if(state.serverUrl && !state.currentUser){
    renderLogin();
    return;
  }
  const root = $("#app");
  root.innerHTML = "";
  root.className = "max-w-[1400px] mx-auto px-4 py-6 anim-in";
  
  if(state.view==="dashboard") renderDashboard(root);
  else if(state.view==="registry") renderRegistry(root);
  else if(state.view==="categories") renderCategories(root);
  else if(state.view==="pm") renderPM(root);
  else if(state.view==="repairs") renderRepairs(root);
  else if(state.view==="logs") renderLogs(root);
  else if(state.view==="import") renderImport(root);
  else if(state.view==="online") renderOnline(root);
  
  const s = stats();
  $("#footStat").textContent = `${s.total} เครื่อง · ใช้งาน ${s.active} · กำลังรวม ${fmt(s.totalKw)} kW (${fmt(s.totalHp)} HP) · ${state.serverUrl?(state.currentUser?"ออนไลน์: "+state.currentUser:"ออนไลน์ (ไม่ได้ล็อกอิน)"):"LocalStorage"}`;
}

function updateUserBadge(){
  const badge = document.getElementById("userBadge");
  if(!badge) return;
  if(state.serverUrl && state.currentUser){
    badge.classList.remove("hidden");
    badge.classList.add("flex");
    badge.innerHTML = `
      <span id="onlineDot" class="inline-block w-2 h-2 rounded-full ${state.isOnline?'bg-emerald-400':'bg-amber-400'}"></span>
      <span id="onlineText" class="text-slate-300">${state.isOnline?'ออนไลน์':'ออฟไลน์'}</span>
      <span class="text-slate-500">·</span>
      <span class="font-semibold">${esc(state.currentUser)}${state.userRole==='admin'?' 👑':''}</span>
      <button onclick="syncPull()" class="ml-1 px-2 py-0.5 rounded bg-cyan-600 hover:bg-cyan-700 text-white" title="ซิงค์">🔄</button>
      <button onclick="doLogout()" class="px-2 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-white" title="ออก">ออก</button>
    `;
  } else {
    badge.classList.add("hidden");
    badge.classList.remove("flex");
  }
  
  // Update tenant in header
  const t = currentTenant();
  const logo = document.getElementById("tenantLogo");
  const nameEl = document.getElementById("tenantName");
  const switcher = document.getElementById("tenantSwitcher");
  if(logo){
    logo.style.background = t.color || "#dc2626";
    logo.textContent = t.shortName || "X";
  }
  if(nameEl){
    nameEl.textContent = t.name;
  }
  if(switcher){
    // Show switcher if user has access to multiple tenants
    if(state.tenants.length > 1 || state.userRole === "admin"){
      switcher.classList.remove("hidden");
      switcher.classList.add("flex");
    } else {
      switcher.classList.add("hidden");
      switcher.classList.remove("flex");
    }
  }
}

function renderLogin(){
  const root = $("#app");

    <div class="min-h-[70vh] flex items-center justify-center">
      <div class="card p-8 max-w-md w-full text-center">
        <div class="w-20 h-20 rounded-2xl bg-red-600 grid place-items-center text-white text-4xl font-bold mx-auto mb-4">DR</div>
        <h2 class="text-2xl font-bold text-slate-900 mb-1">เข้าสู่ระบบ</h2>
        <p class="text-sm text-slate-500 mb-6">ทะเบียนเครื่องจักร · ดักษ์รัตนบุรี</p>
        <div class="text-xs text-slate-400 mb-4 mono break-all" title="${esc(state.serverUrl)}">เซิร์ฟเวอร์: ${esc(state.serverUrl.slice(0,50))}…</div>
        <input type="password" id="pinInput" inputmode="numeric" maxlength="8" placeholder="•••• PIN ••••" autofocus
          class="w-full text-center text-3xl mono tracking-[0.6em] py-3 border-2 border-slate-300 rounded-xl mb-3 ring-focus font-bold">
        <button onclick="submitLogin()" class="w-full px-4 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 transition">เข้าสู่ระบบ</button>
        <div class="flex items-center gap-2 mt-4">
          <div class="flex-1 h-px bg-slate-200"></div>
          <span class="text-xs text-slate-400">หรือ</span>
          <div class="flex-1 h-px bg-slate-200"></div>
        </div>
        <button onclick="state.serverUrl=''; localStorage.removeItem('duct_server_url'); render(); toast('โหมดออฟไลน์','info');" class="mt-3 text-sm text-slate-600 hover:text-red-600 font-medium">← ใช้งานแบบออฟไลน์ (เครื่องนี้เท่านั้น)</button>
        <div class="mt-6 text-xs text-slate-400">หากลืม PIN ติดต่อผู้ดูแลระบบ</div>
      </div>
    </div>`;
  setTimeout(()=>{
    const inp = $("#pinInput");
    if(inp){
      inp.focus();
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter") submitLogin(); });
    }
  },50);

async function submitLogin(){
  const pin = $("#pinInput")?.value?.trim();
  if(!pin){ toast("กรอก PIN","warn"); return; }
  const ok = await doLogin(pin);
  if(ok){
    await syncPull(true);
    render();
  }
}

function kpiCard(label, value, unit, accent, icon, sub){
  return `
    <div class="card p-4 ${accent}">
      <div class="flex items-start justify-between">
        <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold">${label}</div>
        <div class="text-xl">${icon||""}</div>
      </div>
      <div class="mt-2 flex items-baseline gap-1.5">
        <div class="text-3xl font-bold text-slate-900 mono">${value}</div>
        <div class="text-sm text-slate-500">${unit||""}</div>
      </div>
      ${sub?`<div class="text-xs text-slate-500 mt-1">${sub}</div>`:''}
    </div>`;
}

function statusBar(label, value, total, color){
  const pct = total ? (value/total*100) : 0;
  return `
    <div>
      <div class="flex justify-between text-xs mb-1">
        <span class="font-medium text-slate-700">${label}</span>
        <span class="mono text-slate-600">${value}/${total} · ${pct.toFixed(0)}%</span>
      </div>
      <div class="stat-bar"><div class="${color}" style="width:${pct}%"></div></div>
    </div>`;
}

function statusPill(s){
  const map = {
    "ใช้งาน":["pill-ok","●"],"ซ่อม":["pill-warn","◐"],
    "ยกเลิก":["pill-danger","✕"],"ย้าย":["pill-mute","→"]
  };
  const [cls,ic] = map[s]||["pill-mute","?"];
  return `<span class="pill ${cls}">${ic} ${esc(s)}</span>`;
}

function conditionPill(c){
  if(!c) return `<span class="pill pill-mute">— ไม่ระบุ</span>`;
  const map = {
    "พร้อมใช้งาน":["pill-ok","🟢"],
    "ชำรุด":["pill-danger","🔴"]
  };
  const [cls,ic] = map[c]||["pill-mute","?"];
  return `<span class="pill ${cls}">${ic} ${esc(c)}</span>`;
}

function drawCategoryChart(){
  const ctx = document.getElementById("catChart");
  if(!ctx) return;
  if(typeof Chart === "undefined"){ console.warn("Chart.js not loaded"); ctx.parentElement.innerHTML='<div class="text-sm text-amber-700 p-4">⚠ Chart.js โหลดไม่สำเร็จ (เช็คอินเทอร์เน็ต)</div>'; return; }
  const s = stats();
  const colors = s.categories.map(c => colorFor(c.cat));
  const colorsLight = s.categories.map(c => colorFor(c.cat) + "20"); // 20% alpha hover

  // Plugin: draw value at end of each bar
  const valueLabelsPlugin = {
    id: "valueLabels",
    afterDatasetsDraw(chart){
      const {ctx, data} = chart;
      const meta = chart.getDatasetMeta(0);
      ctx.save();
      ctx.font = 'bold 11px "IBM Plex Sans Thai"';
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      meta.data.forEach((bar, i) => {
        const value = data.datasets[0].data[i];
        if (value > 0) {
          ctx.fillStyle = colors[i];
          ctx.fillText(value + "  เครื่อง", bar.x + 6, bar.y);
        }
      });
      ctx.restore();
    }
  };

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: s.categories.map(c=>c.cat),
      datasets: [{
        label: "จำนวน",
        data: s.categories.map(c=>c.count),
        backgroundColor: colors,
        hoverBackgroundColor: colors.map(c=>c+"cc"),
        borderRadius: 6,
        borderSkipped: false,
        maxBarThickness: 26,
        categoryPercentage: 0.85,
        barPercentage: 0.95
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { right: 60 } }, // room for value labels
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#0f172a",
          padding: 10,
          titleFont: { family: "IBM Plex Sans Thai", size: 13, weight: "600" },
          bodyFont: { family: "IBM Plex Sans Thai", size: 12 },
          callbacks: {
            label: c => "  จำนวน: " + c.parsed.x + " เครื่อง"
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          ticks: { stepSize: 1, font: { family: "IBM Plex Sans Thai", size: 11 }, color: "#64748b" },
          grid: { color: "#f1f5f9" }
        },
        y: {
          ticks: {
            font: { family: "IBM Plex Sans Thai", size: 12, weight: "500" },
            color: "#334155"
          },
          grid: { display: false }
        }
      }
    },
    plugins: [valueLabelsPlugin]
  });
}

function drawStatusChart(){
  const ctx = document.getElementById("statusChart");
  if(!ctx) return;
  if(typeof Chart === "undefined") return;
  const s = stats();
  new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:["ใช้งาน","ซ่อม","ยกเลิก","ย้าย"],
      datasets:[{
        data:[s.active,s.repair,s.cancelled,s.moved],
        backgroundColor:["#15803d","#f59e0b","#dc2626","#94a3b8"],
        borderWidth:0
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:"60%",
      plugins:{legend:{position:"bottom",labels:{font:{family:"IBM Plex Sans Thai",size:11},boxWidth:10,padding:8}}}
    }
  });
}

function drawYearChart(yearGroups){
  const ctx = document.getElementById("yearChart");
  if(!ctx) return;
  if(typeof Chart === "undefined") return;
  const years = Object.keys(yearGroups).sort();
  const labels = years.map(y => `พ.ศ.${parseInt(y)+543-2000+2000}`).map((l,i)=>{
    // y is "2563"-ish (Thai BE) actually we have "63" -> "2563"
    let n = parseInt(years[i]);
    if(n<100) n = 2500+n;
    return "พ.ศ."+n;
  });
  new Chart(ctx,{
    type:"line",
    data:{
      labels: labels,
      datasets:[{
        label:"เครื่องที่ขึ้นทะเบียน",
        data: years.map(y=>yearGroups[y]),
        borderColor:"#dc2626",backgroundColor:"rgba(220,38,38,0.1)",
        fill:true, tension:0.3, pointRadius:5, pointBackgroundColor:"#dc2626"
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:"IBM Plex Sans Thai"}}},
              x:{ticks:{font:{family:"IBM Plex Sans Thai"}}}}
    }
  });
}

function countActiveFilters(){
  let n = 0;
  if(state.search) n++;
  if(state.filterCategory!=="ทั้งหมด") n++;
  if(state.filterStatus!=="ทั้งหมด") n++;
  if(state.filterCondition!=="ทั้งหมด") n++;
  if(state.filterBrand!=="ทั้งหมด") n++;
  if(state.filterLocation!=="ทั้งหมด") n++;
  if(state.filterPriceTier!=="ทั้งหมด") n++;
  if(state.filterAgeYears!=="ทั้งหมด") n++;
  return n;
}

function applyPreset(filters){
  resetFilters(true); // silent reset
  Object.assign(state, filters);
  render();
}

function applySavedView(index){
  const v = state.savedViews[index];
  if(!v) return;
  resetFilters(true);
  Object.assign(state, v.filters);
  render();
  toast(`โหลดมุมมอง: ${v.name}`,"info");
}

function promptSaveView(){
  const name = prompt("ตั้งชื่อมุมมองนี้:", "");
  if(!name) return;
  const view = {
    name: name.trim().slice(0,40),
    filters: {
      search: state.search,
      filterCategory: state.filterCategory,
      filterStatus: state.filterStatus,
      filterCondition: state.filterCondition,
      filterBrand: state.filterBrand,
      filterLocation: state.filterLocation,
      filterPriceTier: state.filterPriceTier,
      filterAgeYears: state.filterAgeYears
    },
    savedAt: new Date().toISOString()
  };
  state.savedViews.push(view);
  localStorage.setItem("duct_saved_views", JSON.stringify(state.savedViews));
  toast(`บันทึกมุมมอง "${view.name}" แล้ว`,"ok");
  render();
}

function deleteSavedView(index){
  const v = state.savedViews[index];
  if(!v) return;
  if(!confirm(`ลบมุมมอง "${v.name}"?`)) return;
  state.savedViews.splice(index,1);
  localStorage.setItem("duct_saved_views", JSON.stringify(state.savedViews));
  render();
  toast("ลบแล้ว","info");
}

let _debounceTimer = null;
function debounceRender(){
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(()=>render(),200);
}

function toggleLayout(){ state.layout = state.layout==="table"?"card":"table"; render(); }
function resetFilters(silent){ 
  state.search=""; 
  state.filterCategory="ทั้งหมด"; 
  state.filterStatus="ทั้งหมด"; 
  state.filterCondition="ทั้งหมด"; 
  state.filterBrand="ทั้งหมด"; 
  state.filterLocation="ทั้งหมด";
  state.filterPriceTier="ทั้งหมด";
  state.filterAgeYears="ทั้งหมด";
  if(!silent) render(); 
}

function sortHeader(label, key){
  const active = state.sortBy===key;
  const arrow = active ? (state.sortDir==="asc"?"▲":"▼") : "";
  return `<th class="py-2.5 px-2 text-left text-xs uppercase tracking-wider text-slate-600 cursor-pointer select-none hover:text-red-600" onclick="setSort('${key}')">
    ${label} <span class="ml-1 text-red-600">${arrow}</span>
  </th>`;
}

function setSort(key){
  if(state.sortBy===key) state.sortDir = state.sortDir==="asc"?"desc":"asc";
  else { state.sortBy = key; state.sortDir = "asc"; }
  render();
}

/* ---------- VIEW: PM (PREVENTIVE MAINTENANCE) ---------- */
function renderPM(root){
  const pmByMachine = {};
  state.pm.forEach(p=>{
    if(!pmByMachine[p.machineId]) pmByMachine[p.machineId] = [];
    pmByMachine[p.machineId].push(p);
  });
  
  const now = new Date();
  const upcoming = state.pm.filter(p=>{
    if(!p.nextDate) return false;
    const d = new Date(p.nextDate);
    const diff = (d-now)/86400000;
    return diff <= 30 && diff >= -7;
  }).sort((a,b)=>new Date(a.nextDate)-new Date(b.nextDate));
  
  root.innerHTML = `
    <div class="flex items-end justify-between mb-5 flex-wrap gap-3">
      <div>
        <div class="text-xs tracking-[0.25em] text-slate-500 uppercase mb-1">Preventive Maintenance · บำรุงรักษา</div>
        <h1 class="text-3xl font-bold text-slate-900">แผน PM</h1>
        <div class="text-sm text-slate-500 mt-1">ตรวจสอบและบำรุงรักษาเชิงป้องกัน</div>
      </div>
      <button onclick="openPMEditor()" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 text-sm font-semibold">＋ เพิ่ม PM</button>
    </div>

    <!-- UPCOMING -->
    <div class="card p-5 mb-4 border-l-4 border-amber-500">
      <h3 class="font-bold text-slate-900 mb-3 flex items-center gap-2">
        ⏰ PM ที่ต้องดำเนินการ <span class="text-xs text-slate-500 font-normal">(ภายใน 30 วัน)</span>
      </h3>
      ${upcoming.length===0 ? '<div class="text-sm text-slate-500 py-3">ไม่มี PM ที่ต้องดำเนินการในช่วง 30 วันนี้</div>' :
        `<div class="space-y-2">
          ${upcoming.map(p=>{
            const m = state.machines.find(x=>x.id===p.machineId);
            if(!m) return "";
            const d = new Date(p.nextDate);
            const diff = Math.ceil((d-now)/86400000);
            const cls = diff<0?"bg-red-50 border-red-300":diff<=7?"bg-amber-50 border-amber-300":"bg-slate-50 border-slate-200";
            return `<div class="flex items-center gap-3 p-3 rounded-lg border ${cls}">

/* ---------- VIEW: REPAIRS ---------- */
const REPAIR_TYPES = ["ซ่อมแก้ไข","ซ่อมตามอาการ","ซ่อมใหญ่","เปลี่ยนอะไหล่","ปรับตั้ง","ทำความสะอาด","อื่นๆ"];
const REPAIR_STATUSES = ["รอตรวจสอบ","กำลังซ่อม","รอชิ้นส่วน","ซ่อมเสร็จ","ยกเลิก"];

function repairStatusPill(s){
  const map = {
    "รอตรวจสอบ":["pill-info","◔"],
    "กำลังซ่อม":["pill-warn","⚙"],
    "รอชิ้นส่วน":["pill-accent","⏸"],
    "ซ่อมเสร็จ":["pill-ok","✓"],
    "ยกเลิก":["pill-mute","✕"]
  };
  const [cls,ic] = map[s]||["pill-mute","?"];
  return `<span class="pill ${cls}">${ic} ${esc(s)}</span>`;
}

function renderRepairs(root){
  const repairs = state.repairs.slice().sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
  
  // Stats
  const now = new Date();
  const thisMonth = now.toISOString().slice(0,7); // "2026-05"
  const monthRepairs = repairs.filter(r=>String(r.date||"").startsWith(thisMonth));
  const monthCost = monthRepairs.reduce((s,r)=>s+(+r.totalCost||0),0);
  const totalCost = repairs.reduce((s,r)=>s+(+r.totalCost||0),0);
  const totalDowntime = repairs.reduce((s,r)=>s+(+r.downtime||0),0);

  // Top-spending machines

  repairs.forEach(r=>{
    machineSpend[r.machineId] = (machineSpend[r.machineId]||0) + (+r.totalCost||0);
  });

    .map(([id,cost])=>{
      const m = state.machines.find(x=>x.id===id);
      return m?{m,cost,count:repairs.filter(r=>r.machineId===id).length}:null;

  root.innerHTML = `

      </div>
      <button onclick="openRepairEditor()" class="px-4 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold hover:bg-red-700">＋ เพิ่มประวัติซ่อม</button>

    <!-- KPI -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      ${kpiCard("ครั้งทั้งหมด", repairs.length, "ครั้ง", "border-l-4 border-slate-900", "🛠")}
      ${kpiCard("เดือนนี้", monthRepairs.length, "ครั้ง", "border-l-4 border-cyan-600", "📅", `฿${fmt(monthCost)}`)}
      ${kpiCard("ค่าใช้จ่ายรวม", totalCost>=1000000?(totalCost/1000000).toFixed(2):fmt(totalCost), totalCost>=1000000?"ล้านบาท":"บาท", "border-l-4 border-rose-600", "💰", "")}
      ${kpiCard("กำลังซ่อม", inProgress, "รายการ", "border-l-4 border-amber-600", "⚙", `เวลา ${fmt(totalDowntime)} ชม. รวม`)}
    </div>

    ${topMachines.length>0 ? `
      <div class="card p-5 mb-4">
        <h3 class="font-bold text-slate-900 mb-3">เครื่องที่มีค่าซ่อมสูงสุด (Top 5)</h3>
        <div class="space-y-2">
          ${topMachines.map((t,i)=>`
            <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-50 cursor-pointer" onclick="openDetail('${t.m.id}')">
              <div class="w-8 h-8 rounded-lg ${i===0?'bg-red-600':i===1?'bg-orange-500':i===2?'bg-amber-500':'bg-slate-400'} text-white grid place-items-center font-bold text-sm">${i+1}</div>
              <div class="flex-1 min-w-0">

              </div>
              <div class="stat-bar w-32"><div style="width:${(t.cost/topMachines[0].cost*100).toFixed(0)}%;background:${i===0?'#dc2626':'#f59e0b'}"></div></div>
            </div>
          `).join("")}
        </div>
      </div>
    ` : ''}

    <!-- LIST -->
    <div class="card overflow-hidden">
      <div class="p-4 border-b border-slate-200 flex items-center justify-between flex-wrap gap-2">
        <h3 class="font-bold text-slate-900">รายการซ่อมทั้งหมด <span class="text-sm font-normal text-slate-500">(${repairs.length})</span></h3>

          <select id="repairFilterStatus" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm ring-focus">

        <div class="p-10 text-center text-slate-400">
          <div class="text-4xl mb-2">🛠</div>
          <div class="font-semibold">ยังไม่มีประวัติการซ่อม</div>
          <div class="text-xs mt-1">คลิก "＋ เพิ่มประวัติซ่อม" เพื่อบันทึกครั้งแรก</div>
        </div>
      ` : `
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-xs uppercase text-slate-600">

            <tbody id="repairTbody">
              ${repairs.map(r=>renderRepairRow(r)).join("")}

          </table>
        </div>

  const filterEl = document.getElementById("repairFilterStatus");
  if(filterEl){
    filterEl.addEventListener("change", e=>{
      const v = e.target.value;
      const filtered = v ? repairs.filter(r=>r.status===v) : repairs;
      document.getElementById("repairTbody").innerHTML = filtered.map(r=>renderRepairRow(r)).join("");
    });
  }
}

            <select name="machineId" required class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">

            </select>
          </div>
          <div class="md:col-span-3">
            <label class="text-xs font-semibold text-slate-600 mb-1 block">วันที่ซ่อม *</label>
            <input name="date" type="date" required value="${esc(r.date)}" class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">
          </div>

          </div>
          
          <div class="md:col-span-6">
            <label class="text-xs font-semibold text-slate-600 mb-1 block">สาเหตุ</label>

            <input name="downtime" type="number" step="0.5" min="0" value="${esc(r.downtime||0)}" class="w-full border border-slate-300 rounded-lg px-3 py-2 mono ring-focus">
          </div>
          
          <div class="md:col-span-6">
            <label class="text-xs font-semibold text-slate-600 mb-1 block">ช่างผู้ซ่อม</label>
            <input name="technician" value="${esc(r.technician)}" placeholder="ชื่อช่างหรือบริษัทรับซ่อม" class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">
          </div>

            <label class="text-xs font-semibold text-slate-600 mb-1 block">สถานะ</label>

    if(!data.machineId){ toast("กรุณาเลือกเครื่องจักร","warn"); return; }
    
    const obj = {
      id: data.id || uid(),
      tenantId: state.currentTenantId,
      machineId: data.machineId,
      date: data.date,
      type: data.type,
      problem: data.problem.trim(),
      cause: data.cause.trim(),
      solution: data.solution.trim(),
      partsUsed: data.partsUsed.trim(),
      partsCost: parseFloat(data.partsCost)||0,
      laborCost: parseFloat(data.laborCost)||0,
      totalCost: parseFloat(data.totalCost)||0,
      technician: data.technician.trim(),
      downtime: parseFloat(data.downtime)||0,
      status: data.status,
      notes: data.notes.trim()
    };
    
    const isEdit = !!data.id && state.repairs.some(x=>x.id===data.id);
    if(isEdit){
      const idx = state.repairs.findIndex(x=>x.id===obj.id);
      state.repairs[idx] = {...state.repairs[idx], ...obj};
      addLog("REPAIR-EDIT", state.machines.find(m=>m.id===obj.machineId)?.code||"?", obj.problem);
      toast("แก้ไขประวัติซ่อมเรียบร้อย","ok");

      addLog("REPAIR-ADD", state.machines.find(m=>m.id===obj.machineId)?.code||"?", `${obj.problem} ฿${obj.totalCost}`);
      toast(`บันทึกประวัติซ่อมเรียบร้อย (${fmtTHB(obj.totalCost)})`,"ok");
    }
    save();
    pushRepair(obj);
    closeModal();
    render();
  });
}

function updateRepairTotal(){
  const form = document.getElementById("repairForm");
  if(!form) return;
  const parts = parseFloat(form.partsCost.value)||0;
  const labor = parseFloat(form.laborCost.value)||0;
  form.totalCost.value = (parts + labor).toFixed(0);
}

function deleteRepair(id){
  const r = state.repairs.find(x=>x.id===id);
  if(!r) return;
  if(!confirm(`ลบประวัติซ่อมนี้?\n\n"${r.problem}" (${r.date})`)) return;
  state.repairs = state.repairs.filter(x=>x.id!==id);
  addLog("REPAIR-DEL", state.machines.find(m=>m.id===r.machineId)?.code||"?", r.problem);
  save();
  pushDeleteRepair(id);
  render();
  toast("ลบประวัติซ่อมแล้ว","danger");
}

async function saveServerUrl(){
  const url = $("#serverUrlInput").value.trim();
  if(!url){ toast("กรอก URL","warn"); return; }
  if(!url.startsWith("https://script.google.com/")){
    if(!confirm("URL ไม่ใช่ Google Apps Script URL — ดำเนินการต่อ?")) return;
  }
  state.serverUrl = url;
  localStorage.setItem("duct_server_url", url);
  await testConnection();
  // Force re-render to show login if needed
  setTimeout(()=>render(),500);
}

async function restoreAndPush(){
  if(!confirm(`กู้คืนข้อมูลเริ่มต้น 44 รายการ + ส่งขึ้นเซิร์ฟเวอร์?\n\n(ข้อมูลใน LocalStorage ปัจจุบันจะถูกแทนที่)`)) return;
  toast("กำลังกู้คืน...","info");
  // Restore from INITIAL_DATA
  state.machines = INITIAL_DATA.map(x=>{
    const obj = {...x, id:uid()};
    if(obj.vendor===undefined) obj.vendor = "";
    if(obj.price===undefined) obj.price = 0;
    if(obj.location===undefined) obj.location = "";
    if(obj.condition===undefined) obj.condition = obj.status==="ใช้งาน"?"พร้อมใช้งาน":"";
    return obj;
  });
  state.pm = [];
  state.logs = [];
  save();
  addLog("RESTORE","initial",`${state.machines.length} รายการ`);
  // Push to server
  try{
    const r = await api("bulkImport", {machines: state.machines, tenantId: state.currentTenantId});
    toast(`กู้คืน + อัปโหลด ${r.count} รายการสำเร็จ ✓`,"ok");
    state.lastSync = new Date().toISOString();
    localStorage.setItem("duct_last_sync", state.lastSync);
    render();
  }catch(e){
    toast("กู้คืนแล้ว แต่อัปโหลดล้มเหลว: "+e.message+" (ลองกด Push ใหม่ได้)","warn");
    render();
  }
}

function deleteMachine(id, fromDetail){
  const m = state.machines.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`ลบเครื่องจักร "${m.code} - ${m.name}" ใช่หรือไม่?\n\nการดำเนินการนี้ไม่สามารถย้อนกลับได้`)) return;
  state.machines = state.machines.filter(x=>x.id!==id);
  state.pm = state.pm.filter(p=>p.machineId!==id);
  addLog("DELETE", m.code, m.name);
  save();
  pushDeleteMachine(id); // auto-sync
  if(fromDetail) closeModal();
  render();
  toast(`ลบ ${m.code} แล้ว`,"danger");
}

/* ---------- PM EDITOR ---------- */
function openPMEditor(pmId, machineId){
  const machineOptions = state.machines.map(m=>`<option value="${m.id}" ${machineId===m.id?'selected':''}>${esc(m.code)} - ${esc(m.name)}</option>`).join("");
  const html = `
    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-start justify-center overflow-y-auto p-4" onclick="if(event.target===this)closeModal()">
      <div class="card max-w-lg w-full my-8 anim-in">

        </div>

          <div>
            <label class="text-xs font-semibold text-slate-600 block mb-1">เครื่องจักร *</label>
            <select name="machineId" required class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">${machineOptions}</select>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 block mb-1">งานบำรุงรักษา *</label>
            <input name="task" required placeholder="เช่น เปลี่ยนน้ำมันเครื่อง, ตรวจสอบมอเตอร์" class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div>
              <label class="text-xs font-semibold text-slate-600 block mb-1">ทำครั้งล่าสุด</label>
              <input name="lastDate" type="date" value="${today()}" class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-600 block mb-1">ทุกๆ (วัน) *</label>
              <input name="intervalDays" type="number" min="1" value="90" required class="w-full border border-slate-300 rounded-lg px-3 py-2 mono ring-focus">
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-600 block mb-1">ครั้งถัดไป *</label>
              <input name="nextDate" type="date" required class="w-full border border-slate-300 rounded-lg px-3 py-2 ring-focus">
            </div>
          </div>
          <div class="flex justify-end gap-2 pt-3 border-t border-slate-200">
            <button type="button" onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-semibold">ยกเลิก</button>
            <button type="submit" class="px-5 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  `;
  $("#modalRoot").innerHTML = html;
  
  // Auto-fill next date
  const form = $("#pmForm");
  function updateNext(){
    const last = form.lastDate.value;
    const interval = parseInt(form.intervalDays.value)||0;
    if(last && interval){
      const d = new Date(last);
      d.setDate(d.getDate()+interval);
      form.nextDate.value = d.toISOString().slice(0,10);
    }
  }
  form.lastDate.addEventListener("change",updateNext);
  form.intervalDays.addEventListener("input",updateNext);
  updateNext();
  
  form.addEventListener("submit",e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd);
    const m = state.machines.find(x=>x.id===data.machineId);
    const newPM = {
      id: uid(),
      tenantId: state.currentTenantId,
      machineId: data.machineId,
      task: data.task,
      lastDate: data.lastDate,
      intervalDays: parseInt(data.intervalDays),
      nextDate: data.nextDate
    };
    state.pm.push(newPM);
    addLog("PM", m?.code||"?", `เพิ่ม: ${data.task}`);
    save();
    pushPM(newPM); // auto-sync
    closeModal();
    render();
    toast("เพิ่มแผน PM แล้ว","ok");
  });
}

function deletePM(id){
  if(!confirm("ลบแผน PM นี้?")) return;
  state.pm = state.pm.filter(p=>p.id!==id);
  save();
  pushDeletePM(id); // auto-sync
  render();
  toast("ลบแล้ว","ok");
}

function completePM(id){
  const p = state.pm.find(x=>x.id===id);
  if(!p) return;
  const m = state.machines.find(x=>x.id===p.machineId);
  const t = today();
  p.lastDate = t;
  const d = new Date(t);
  d.setDate(d.getDate()+p.intervalDays);
  p.nextDate = d.toISOString().slice(0,10);
  addLog("PM", m?.code||"?", `เสร็จสิ้น: ${p.task} (ถัดไป ${p.nextDate})`);
  save();
  pushPM(p); // auto-sync
  render();
  toast(`บันทึก PM เรียบร้อย — ครั้งถัดไป ${p.nextDate}`,"ok");
}

/* ---------- QR PRINT (inline, no popup) ---------- */
function printQR(id){
  const m = state.machines.find(x=>x.id===id);
  if(!m) return;
  if(typeof qrcode === "undefined"){ toast("QR library ยังไม่โหลด — กรุณา refresh หน้าใหม่","danger"); return; }
  
  // Generate QR as base64 data URL
  let dataUrl = "";
  try{
    const qr = qrcode(0, "M");
    qr.addData(JSON.stringify({code:m.code,name:m.name,serial:m.serial}));
    qr.make();
    dataUrl = qr.createDataURL(6, 2); // cellSize=6, margin=2 → ~200px
  }catch(e){
    toast("ไม่สามารถสร้าง QR: "+e.message,"danger");
    return;
  }
  
  // Insert hidden print-only section into current page
  const old = document.getElementById("printQRArea");
  if(old) old.remove();
  
  const div = document.createElement("div");
  div.id = "printQRArea";
  div.innerHTML = `
    <style id="printQRStyle">
      @media print {
        body * { visibility: hidden !important; }
        #printQRArea, #printQRArea * { visibility: visible !important; }
        #printQRArea {
          position: fixed !important; left: 0 !important; top: 0 !important;
          width: 100% !important; padding: 24px !important;
          display: flex !important; justify-content: center !important; align-items: flex-start !important;

/* ---------- QR SCANNER (html5-qrcode) ---------- */
let _qrScanner = null;
let _qrTorchOn = false;
let _qrCameraIdx = 0; // index into available cameras
let _qrCameras = [];

async function openScanner(){
  if(typeof Html5Qrcode === "undefined"){
    toast("Scanner library โหลดไม่สำเร็จ — กรุณา refresh หน้า","danger");
    return;
  }
  
  // Build scanner overlay
  const overlay = document.createElement("div");
  overlay.id = "qrScannerOverlay";
  overlay.innerHTML = `
    <div class="fixed inset-0 bg-black z-[80] flex flex-col no-print">
      <!-- TOP BAR -->
      <div class="flex items-center justify-between px-4 py-3 bg-slate-900/95 text-white shadow-lg">
        <div>
          <div class="text-[10px] tracking-[0.25em] uppercase text-slate-400">QR Scanner</div>
          <div class="font-bold text-base">สแกน QR เครื่องจักร</div>
        </div>
        <button onclick="closeScanner()" class="w-10 h-10 grid place-items-center rounded-lg bg-white/10 hover:bg-white/20 text-2xl">×</button>
      </div>
      
      <!-- VIDEO AREA -->
      <div class="flex-1 relative overflow-hidden bg-black flex items-center justify-center">
        <div id="qrReader" class="w-full h-full"></div>
        
        <!-- SCAN FRAME OVERLAY -->
        <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
          <div class="relative" style="width:min(70vw,70vh);height:min(70vw,70vh);max-width:340px;max-height:340px;">
            <!-- 4 corner brackets -->
            <div style="position:absolute;top:0;left:0;width:40px;height:40px;border-top:4px solid #06b6d4;border-left:4px solid #06b6d4;border-top-left-radius:8px;"></div>
            <div style="position:absolute;top:0;right:0;width:40px;height:40px;border-top:4px solid #06b6d4;border-right:4px solid #06b6d4;border-top-right-radius:8px;"></div>
            <div style="position:absolute;bottom:0;left:0;width:40px;height:40px;border-bottom:4px solid #06b6d4;border-left:4px solid #06b6d4;border-bottom-left-radius:8px;"></div>
            <div style="position:absolute;bottom:0;right:0;width:40px;height:40px;border-bottom:4px solid #06b6d4;border-right:4px solid #06b6d4;border-bottom-right-radius:8px;"></div>
            <!-- Scan line animation -->
            <div id="scanLine" style="position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,#06b6d4,transparent);box-shadow:0 0 10px #06b6d4;animation:scanline 2s ease-in-out infinite;"></div>
          </div>
        </div>
        
        <!-- HINT -->
        <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 text-white text-xs px-3 py-1.5 rounded-full backdrop-blur">
          วางกล้องตรง QR code
        </div>
        
        <!-- STATUS -->
        <div id="scanStatus" class="absolute bottom-24 left-1/2 -translate-x-1/2 bg-black/70 text-white text-sm px-4 py-2 rounded-lg backdrop-blur hidden"></div>
      </div>
      
      <!-- BOTTOM CONTROLS -->
      <div class="bg-slate-900/95 px-4 py-3 flex items-center justify-center gap-3">
        <button id="btnTorch" onclick="toggleTorch()" class="px-4 py-2.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold flex items-center gap-2" title="เปิด/ปิดไฟฉาย">
          🔦 <span class="hidden sm:inline">ไฟฉาย</span>
        </button>
        <button id="btnSwitchCam" onclick="switchCamera()" class="px-4 py-2.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold flex items-center gap-2 hidden" title="สลับกล้องหน้า/หลัง">
          🔄 <span class="hidden sm:inline">สลับกล้อง</span>
        </button>
        <button onclick="manualLookup()" class="px-4 py-2.5 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-semibold flex items-center gap-2">
          ⌨ พิมพ์รหัสเอง
        </button>
      </div>
    </div>
    <style>
      @keyframes scanline { 0%,100% {top:0;opacity:1;} 50% {top:calc(100% - 2px);opacity:1;} 25%,75%{opacity:0.6;} }
      #qrReader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
      #qrReader { overflow: hidden; }
    </style>
  `;
  document.body.appendChild(overlay);
  
  try{
    // Discover cameras
    _qrCameras = await Html5Qrcode.getCameras();
    if(!_qrCameras || _qrCameras.length === 0){
      throw new Error("ไม่พบกล้องในเครื่องนี้");
    }
    
    // Show "switch camera" button if multiple cameras
    if(_qrCameras.length > 1){
      const btn = document.getElementById("btnSwitchCam");
      if(btn) btn.classList.remove("hidden");
    }
    
    // Prefer rear camera (mobile) — heuristic: pick last in list, or one with "back"/"rear" in label
    _qrCameraIdx = _qrCameras.findIndex(c => /back|rear|environment/i.test(c.label));
    if(_qrCameraIdx < 0) _qrCameraIdx = _qrCameras.length - 1;
    
    await startScanner();
  }catch(e){
    console.error("Scanner init failed:", e);
    closeScanner();
    if(String(e).includes("Permission") || String(e).includes("NotAllowed")){
      toast("ไม่ได้รับอนุญาตให้ใช้กล้อง — กรุณาอนุญาตในการตั้งค่าเบราว์เซอร์","danger");
    } else {
      toast("เปิดกล้องไม่สำเร็จ: "+(e.message||e),"danger");
    }
  }
}

async function startScanner(){
  if(_qrScanner){
    try{ await _qrScanner.stop(); }catch(_){}
    _qrScanner = null;
  }
  _qrScanner = new Html5Qrcode("qrReader", {verbose: false});
  const camId = _qrCameras[_qrCameraIdx].id;
  
  await _qrScanner.start(
    camId,
    {
      fps: 10,
      qrbox: function(viewfinderWidth, viewfinderHeight){
        const min = Math.min(viewfinderWidth, viewfinderHeight);
        const size = Math.floor(min * 0.7);
        return { width: size, height: size };
      },
      aspectRatio: window.innerWidth > window.innerHeight ? 16/9 : 9/16
    },
    onQRScanSuccess,
    onQRScanError
  );
}

function onQRScanSuccess(decodedText, decodedResult){
  // Lookup machine
  let code = "";
  let parsed = null;
  try{
    parsed = JSON.parse(decodedText);
    code = parsed.code || "";
  }catch(_){
    // Not JSON — treat as raw code
    code = String(decodedText).trim();
  }
  
  if(!code){
    showScanStatus("QR ไม่มีข้อมูลเครื่อง","warn");
    return;
  }
  
  // Find machine by code (case-insensitive)
  const machine = state.machines.find(m => 
    String(m.code).toLowerCase() === code.toLowerCase()
  );
  
  if(machine){
    // Success — close scanner and open detail
    showScanStatus(`✓ พบ: ${machine.code} ${machine.name}`,"ok");
    // Vibrate if supported
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
    setTimeout(()=>{
      closeScanner();
      openDetail(machine.id);
    }, 600);
  } else {
    showScanStatus(`✗ ไม่พบเครื่อง "${code}" ในระบบ`,"danger");
    // Vibrate error pattern
    if(navigator.vibrate) navigator.vibrate(300);
    // Continue scanning after 2s
    setTimeout(()=>{
      const el = document.getElementById("scanStatus");
      if(el) el.classList.add("hidden");
    }, 2500);
  }
}

function onQRScanError(err){
  // Per-frame errors are normal (no QR in view) — ignore them silently
}

function showScanStatus(text, type){
  const el = document.getElementById("scanStatus");
  if(!el) return;
  const colors = {ok:"bg-emerald-600", warn:"bg-amber-600", danger:"bg-red-600", info:"bg-slate-700"};
  el.className = `absolute bottom-24 left-1/2 -translate-x-1/2 ${colors[type]||colors.info} text-white text-sm px-4 py-2 rounded-lg backdrop-blur font-semibold`;
  el.textContent = text;
}

async function switchCamera(){
  if(_qrCameras.length < 2) return;
  _qrCameraIdx = (_qrCameraIdx + 1) % _qrCameras.length;
  _qrTorchOn = false;
  try{
    await startScanner();
    toast("สลับเป็น: " + (_qrCameras[_qrCameraIdx].label || "กล้อง " + (_qrCameraIdx+1)),"info");
  }catch(e){
    toast("สลับกล้องไม่สำเร็จ: "+e.message,"danger");
  }
}

async function toggleTorch(){
  if(!_qrScanner) return;
  try{
    _qrTorchOn = !_qrTorchOn;
    await _qrScanner.applyVideoConstraints({
      advanced: [{ torch: _qrTorchOn }]
    });
    const btn = document.getElementById("btnTorch");
    if(btn){
      btn.className = `px-4 py-2.5 rounded-lg ${_qrTorchOn?'bg-amber-500 hover:bg-amber-400':'bg-slate-700 hover:bg-slate-600'} text-white text-sm font-semibold flex items-center gap-2`;
    }
  }catch(e){
    toast("กล้องนี้ไม่รองรับไฟฉาย","warn");
    _qrTorchOn = false;
  }
}

function manualLookup(){
  const code = prompt("พิมพ์รหัสเครื่องจักร (เช่น MC01, MC36):");
  if(!code) return;
  const machine = state.machines.find(m => 
    String(m.code).toLowerCase() === code.trim().toLowerCase()
  );
  if(machine){
    closeScanner();
    openDetail(machine.id);
  } else {
    toast(`ไม่พบเครื่อง "${code}" ในระบบ`,"danger");
  }
}

async function closeScanner(){
  if(_qrScanner){
    try{ 
      await _qrScanner.stop();
      _qrScanner.clear();
    }catch(_){}
    _qrScanner = null;
  }
  _qrTorchOn = false;
  const el = document.getElementById("qrScannerOverlay");
  if(el) el.remove();
}

/* ---------- IMPORT / EXPORT ---------- */

    NO: m.no,
    "รหัสเครื่อง": m.code,
    "ชื่อเครื่องจักรและอุปกรณ์": m.name,
    "Brand": m.brand,
    "Serial No": m.serial,
    "ข้อมูลเครื่องจักร": m.spec,
    "วันที่ขึ้นทะเบียน": m.regDate,
    "ชื่อผู้ขาย": m.vendor||"",
    "ราคาทรัพย์สิน (บาท)": m.price||0,
    "สถานที่ใช้งาน": m.location||"",
    "สภาพ": m.condition||"",
    "หมายเหตุ": m.note,
    "kW": m.kw,
    "HP": m.hp,
    "หมวดหมู่": m.category,
    "สถานะ": m.status
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws["!cols"] = [{wch:6},{wch:14},{wch:36},{wch:18},{wch:16},{wch:50},{wch:14},{wch:22},{wch:16},{wch:22},{wch:14},{wch:18},{wch:8},{wch:8},{wch:14},{wch:10}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ทะเบียนเครื่องจักร");
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `ทะเบียนเครื่องจักร_${date}.xlsx`);
  toast("ส่งออก Excel เรียบร้อย","ok");
}

function exportJson(){
  const blob = new Blob([JSON.stringify({machines:state.machines,pm:state.pm,logs:state.logs.slice(0,100)},null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `backup_machines_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("ดาวน์โหลดไฟล์สำรอง","ok");
}

function importJson(e){
  const f = e.target.files[0];
  if(!f) return;
  if(!confirm("ข้อมูลปัจจุบันจะถูกแทนที่ทั้งหมด ต้องการดำเนินการต่อ?")) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const d = JSON.parse(ev.target.result);
      if(d.machines) state.machines = d.machines;
      if(d.pm) state.pm = d.pm;
      if(d.logs) state.logs = d.logs;
      save(); render(); toast("กู้ข้อมูลสำเร็จ","ok");
    }catch(err){ toast("ไฟล์ไม่ถูกต้อง","danger"); }
  };
  reader.readAsText(f);
}

function importXlsx(replace){
  const f = document.getElementById("xlsxFile").files[0];
  if(!f){ toast("กรุณาเลือกไฟล์","warn"); return; }
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result,{type:"array"});
      // Try main sheet
      const candidates = ["ตารางทะเบียนเครื่องจักร (2)","ตารางทะเบียนเครื่องจักร", wb.SheetNames[0]];
      let sheetName = candidates.find(n=>wb.SheetNames.includes(n));
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
      
      // Find header row
      let headerRow = rows.findIndex(r=>r.some(c=>String(c||"").includes("รหัสเครื่อง")));
      if(headerRow<0){ toast("ไม่พบหัวตาราง","danger"); return; }
      
      const imported = [];
      for(let i=headerRow+1; i<rows.length; i++){
        const r = rows[i];
        if(!r[0] && !r[1]) continue;
        if(String(r[0]||"").includes("ผู้จัดทำ") || String(r[0]||"").includes("รวม")) break;
        const code = String(r[1]||"").trim();
        const name = String(r[3]||"").trim();
        if(!code || !name) continue;
        
        imported.push({
          id: uid(),
          no: parseFloat(r[0]) || 0,
          code: code.replace(/\s*\(?ยกเลิก.*\)?/,"").replace(/\s*ย้าย.*/,"").trim(),
          rawCode: code,
          name: name,
          brand: String(r[4]||"").trim(),
          serial: String(r[5]||"").trim(),
          spec: String(r[6]||"").trim(),
          regDate: String(r[7]||"").trim(),
          note: String(r[8]||"").trim(),
          kw: parseFloat(r[9]) || 0,
          hp: parseFloat(r[10]) || 0,
          category: categorize(name),
          status: getStatus(code,String(r[7]||""))
        });
      }
      
      if(imported.length===0){ toast("ไม่พบข้อมูลในไฟล์","warn"); return; }
      
      if(replace) state.machines = imported;
      else state.machines = state.machines.concat(imported);
      
      addLog("IMPORT","Excel",`${imported.length} รายการ ${replace?"(แทนที่)":"(เพิ่ม)"}`);
      save(); render(); toast(`นำเข้า ${imported.length} รายการสำเร็จ`,"ok");
    }catch(err){
      console.error(err);
      toast("เกิดข้อผิดพลาด: "+err.message,"danger");
    }
  };
  reader.readAsArrayBuffer(f);
}

function categorize(name){
  if(!name) return "อื่นๆ";
  if(name.includes("โฟร์คลิฟท์")||name.includes("โฟล์คลิฟท์")) return "รถโฟร์คลิฟท์";
  if(name.includes("เครน")) return "เครน";
  if(name.includes("ปั้มลม")||name.includes("ปั๊มลม")) return "ปั้มลม";
  if(name.includes("ปั้ม")||name.includes("ปั๊ม")) return "เครื่องปั้ม";
  if(name.includes("เชื่อม")) return "เครื่องเชื่อม";
  if(name.includes("ตัด")) return "เครื่องตัด";
  if(name.includes("พับ")) return "เครื่องพับ";
  if(name.includes("รีด")) return "เครื่องรีด";
  if(name.includes("ป้อน")) return "เครื่องป้อน";
  if(name.includes("สว่าน")) return "สว่านแท่น";
  if(name.includes("ตู้")||name.includes("MDB")) return "ตู้ไฟฟ้า";
  if(name.includes("ผลิตท่อ")) return "เครื่องผลิตท่อ";
  return "อื่นๆ";
}

function getStatus(code, date){
  code = String(code||""); date = String(date||"");
  if(code.includes("ยกเลิก")||date.includes("ยกเลิก")) {
    if(code.includes("ย้าย")) return "ย้าย";
    return "ยกเลิก";
  }
  return "ใช้งาน";
}

function resetData(){
  if(!confirm("ต้องการรีเซ็ตข้อมูลเป็นค่าเริ่มต้นใช่หรือไม่?\nข้อมูลที่เพิ่มและแก้ไขทั้งหมดจะหายไป")) return;
  state.machines = INITIAL_DATA.map(x=>({...x,id:uid()}));
  state.pm = [];
  state.logs = [];
  addLog("IMPORT","Reset","รีเซ็ตเป็นค่าเริ่มต้น");
  save(); render();
  toast("รีเซ็ตเรียบร้อย","ok");
}
